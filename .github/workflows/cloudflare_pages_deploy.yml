name: Deploy to CloudFlare Pages

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          
      - name: Clean solution
        run: dotnet clean dopMiniJogoNet.Mvc/dopMiniJogoNet.Mvc.csproj
        
      - name: Restore dependencies
        run: dotnet restore dopMiniJogoNet.Mvc/dopMiniJogoNet.Mvc.csproj
        
      - name: Build project
        run: dotnet build dopMiniJogoNet.Mvc/dopMiniJogoNet.Mvc.csproj -c Release --no-restore
        
      - name: Publish .NET MVC
        run: dotnet publish dopMiniJogoNet.Mvc/dopMiniJogoNet.Mvc.csproj -c Release -o publish --no-build
        
      # Criar arquivo 404.html para SPA routing
      - name: Create 404.html
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0;URL=/">
              <title>Redirecionando...</title>
          </head>
          <body>
              <h1>Redirecionando...</h1>
              <p>Se não for redirecionado automaticamente, <a href="/">clique aqui</a>.</p>
          </body>
          </html>' > publish/wwwroot/404.html
          
      # Opcional: Criar _redirects para melhor handling de rotas
      - name: Create _redirects file
        run: |
          echo '/*    /index.html   200' > publish/wwwroot/_redirects
          
      # Debug: Verificar o que foi gerado
      - name: List publish directory contents
        run: |
          echo "Contents of publish directory:"
          ls -la publish/
          echo "Contents of publish/wwwroot directory:"
          ls -la publish/wwwroot/
          
      - name: Deploy to CloudFlare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy publish/wwwroot --project-name=minijogo-net --compatibility-date=2024-01-01
